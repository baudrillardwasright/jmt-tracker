<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildfire layer test — delete after use</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  body { font-family: monospace; margin: 16px; background: #f5f5f0; color: #222; }
  h1 { font-size: 16px; }
  #status { white-space: pre-line; background: #fff; border: 1.5px solid #222;
            padding: 10px 14px; margin-bottom: 12px; font-size: 13px; }
  #map { height: 70vh; border: 1.5px solid #222; }
</style>
</head>
<body>
<h1>Wildfire layer test (Chico, CA · ~100 mi radius) — temporary file, delete from repo when done</h1>
<div id="status">Running…</div>
<div id="map"></div>

<script>
"use strict";
const statusEl = document.getElementById("status");
const log = s => { statusEl.textContent += "\n" + s; };
statusEl.textContent = "Querying NIFC WFIGS current perimeters…";

const map = L.map("map").setView([39.7285, -121.8375], 8); // Chico
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",
  { maxZoom: 19, attribution: "Map © OpenStreetMap contributors" }).addTo(map);
L.circle([39.7285, -121.8375], { radius: 160934, color: "#33688F", weight: 1.5,
  fill: false, dashArray: "6 6" }).addTo(map); // 100-mile radius ring

// EXACTLY the query + render code from index.html, only the box differs
async function queryFires(label, bbox, draw) {
  try {
    const url = "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/" +
      "WFIGS_Interagency_Perimeters_Current/FeatureServer/0/query" +
      "?where=1%3D1&outFields=*&geometry=" + bbox +
      "&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects" +
      "&outSR=4326&f=geojson";
    const res = await fetch(url);
    const gj = await res.json();
    if (gj?.error) { log(label + ": SERVICE ERROR — " + JSON.stringify(gj.error).slice(0, 300)); return; }
    const n = gj?.features?.length || 0;
    log(label + ": " + n + " perimeter(s)");
    if (!n) return;
    gj.features.forEach(f => {
      const p = f.properties || {};
      const name = p.poly_IncidentName || p.attr_IncidentName || p.IncidentName || "Wildfire";
      const acres = p.poly_GISAcres || p.attr_IncidentSize || p.GISAcres;
      log("   • " + name + (acres ? " — " + Math.round(acres).toLocaleString() + " acres" : ""));
    });
    if (draw) {
      L.geoJSON(gj, {
        style: { color: "#D93025", weight: 1.5, fillColor: "#D93025", fillOpacity: 0.22 },
        onEachFeature: (f, l) => {
          const p = f.properties || {};
          const name = p.poly_IncidentName || p.attr_IncidentName || p.IncidentName || "Wildfire";
          const acres = p.poly_GISAcres || p.attr_IncidentSize || p.GISAcres;
          l.bindPopup(`<strong>${String(name)}</strong>` +
            (acres ? `<br>${Math.round(acres).toLocaleString()} acres` : "") +
            `<br><span style="font-size:11px">NIFC current perimeter</span>`);
        }
      }).addTo(map);
    }
  } catch (e) { log(label + ": FETCH FAILED — " + String(e).slice(0, 200)); }
}

(async () => {
  // Chico ±100 mi: 100 mi ≈ 1.45° lat, ≈ 1.88° lon at this latitude
  await queryFires("Chico 100-mi box", "-123.72,38.28,-119.96,41.18", true);
  // the production JMT-corridor box, for comparison
  await queryFires("JMT corridor box (production)", "-120.4,36.1,-117.6,38.3", false);
  log("\nIf Chico shows perimeters drawn in red, the code works and the JMT box was genuinely empty.");
})();
</script>
</body>
</html>
